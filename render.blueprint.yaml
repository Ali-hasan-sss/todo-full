# (اختياري) Blueprint متعدد الخدمات — يتطلب Worker مدفوع
# استخدم render.yaml + Dockerfile.render للنشر المجاني

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
    plan: free

services:
  - type: redis
    name: taskflow-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: taskflow-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskflow-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: SEED_ADMIN_EMAIL
        value: admin@todo.app
      - key: SEED_DEMO_EMAIL
        value: demo@todo.app
      - key: SEED_ADMIN_PASSWORD
        sync: false

  - type: worker
    name: taskflow-worker
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run render:build:worker
    startCommand: npm run worker:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskflow-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: taskflow-api
          envVarKey: JWT_ACCESS_SECRET
      - key: JWT_REFRESH_SECRET
        fromService:
          type: web
          name: taskflow-api
          envVarKey: JWT_REFRESH_SECRET
