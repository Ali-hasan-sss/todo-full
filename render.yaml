# Render — خدمة Docker واحدة (مجاني، بدون Blueprint مدفوع)
# New → Web Service → Docker → اربط المستودع
# المتغير الوحيد المطلوب: CORS_ORIGIN = رابط Vercel

services:
  - type: web
    name: taskflow
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        sync: false
