# Render — Docker (مجلد backend)
# إعدادات Dashboard: Root Directory = backend (أو اترك فارغاً واستخدم المسارات أدناه)

services:
  - type: web
    name: taskflow
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        sync: false
